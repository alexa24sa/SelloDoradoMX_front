<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6BB88A" />
  <title>Acceso – SelloDoradoMX</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="auth-page">

  <div class="app-container">

    <!-- ===== FONDO + LOGO BLANCO ===== -->
    <div class="auth-hero">
      <img
        src="./assets/images/bg.png"
        alt="Fondo SelloDoradoMX"
        class="auth-hero-bg"
      />
      <div class="auth-hero-overlay" aria-hidden="true"></div>

      <!-- Logo blanco centrado sobre la imagen -->
      <div class="auth-hero-logo">
        <img
          src="./assets/images/logo-blanco.png"
          alt="SelloDoradoMX"
          class="auth-logo-img"
          onerror="this.replaceWith(document.createTextNode('SelloDoradoMX'))"
        />
      </div>
    </div>

    <!-- ===== CARD FORMULARIO ===== -->
    <div class="auth-card">

      <!-- Tabs LOGIN / SIGN UP -->
      <div class="auth-tabs" role="tablist">
        <button
          id="loginTab"
          class="auth-tab auth-tab--active"
          role="tab"
          aria-selected="true"
          onclick="showLogin()"
        >LOGIN</button>
        <button
          id="signupTab"
          class="auth-tab"
          role="tab"
          aria-selected="false"
          onclick="showSignup()"
        >SIGN UP</button>
      </div>

      <h2 class="auth-welcome">Welcome to SelloDoradoMX!</h2>

      <!-- ── LOGIN FORM ── -->
      <form id="loginForm" class="auth-form" novalidate>
        <input
          id="loginEmail"
          class="auth-input"
          type="email"
          placeholder="Email"
          autocomplete="email"
          aria-label="Email"
          required
        />
        <input
          id="loginPassword"
          class="auth-input"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          aria-label="Contraseña"
          required
        />

        <button type="button" class="btn-primary" onclick="login()">LOGIN</button>

        <!-- Divider -->
        <div class="auth-divider"><span>o</span></div>

        <!-- Google -->
        <div id="googleBtn"></div>
      </form>

      <!-- ── SIGNUP FORM ── -->
      <form id="signupForm" class="auth-form auth-form--hidden" novalidate>
        <input
          id="signupName"
          class="auth-input"
          type="text"
          placeholder="Name"
          autocomplete="given-name"
          aria-label="Nombre"
          required
        />
        <input
          id="signupLastname"
          class="auth-input"
          type="text"
          placeholder="Lastname"
          autocomplete="family-name"
          aria-label="Apellido"
          required
        />
        <input
          id="signupEmail"
          class="auth-input"
          type="email"
          placeholder="Email"
          autocomplete="email"
          aria-label="Email"
          required
        />
        <input
          id="signupPassword"
          class="auth-input"
          type="password"
          placeholder="Password"
          autocomplete="new-password"
          aria-label="Contraseña"
          minlength="8"
          required
        />

        <button type="button" class="btn-primary" onclick="signup()">Create Account</button>
      </form>

      <p class="auth-tourist-link">
        Despues de iniciar sesion podras explorar negocios y experiencias verificadas.
      </p>

    </div><!-- /.auth-card -->

  </div><!-- /.app-container -->

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/ui-feedback.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    let API_BASE_URL = 'http://localhost:8088/api/v1';
    const GOOGLE_CLIENT_ID = "146630611488-rtk4gcr4g7nqei3690tvk9218jhhpgi0.apps.googleusercontent.com";
    const ui = window.AppUi;

    const loginTab   = document.getElementById('loginTab');
    const signupTab  = document.getElementById('signupTab');
    const loginForm  = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    function saveAuth(authResponse) {
      const token = authResponse?.accessToken;
      if (!token) return;
      localStorage.setItem('token', token);
      localStorage.setItem('tokenType', authResponse?.tokenType || 'Bearer');
      if (authResponse?.user) {
        localStorage.setItem('currentUser', JSON.stringify(authResponse.user));
      }
    }

    function getStoredUser() {
      try {
        return JSON.parse(localStorage.getItem('currentUser') || 'null');
      } catch {
        return null;
      }
    }

    function resolvePostAuthRoute(user) {
      return user?.roleName === 'ROLE_ADMIN' ? 'admin.html' : 'home.html';
    }

    window.onload = () => {
        // A. Inicializar el cliente de Google
      google.accounts.id.initialize({
        client_id:GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse, // Función que se ejecuta tras el login
        auto_select: false, // Si es true, loguea automáticamente si ya hay sesión
      });

      // B. Renderizar el botón oficial
      google.accounts.id.renderButton(document.getElementById("googleBtn"), {
        theme: "outline",
        size: "large",
        shape: "pill",
        text: "signin_with",
      });
    };

    //Esta función recibe la respuesta de Google tras un login exitoso
    async function handleCredentialResponse(response) {
      // El 'response.credential' es el JWT (ID Token) que se necesita
      const googleToken = response.credential;
      console.log("Token generado por Google:", googleToken);

      // D. Enviar el token al Backend de Spring Boot
      try {
        const res = await fetch(`${API_BASE_URL}/users/auth/google`, {
            method: "POST",
            headers: { "Content-Type": "application/json"},
            body: JSON.stringify({googleToken})
        });

        if (!res.ok) throw new Error(await parseApiError(res));
        const data = await res.json();
        console.log(data)
        saveAuth(data);
        await ui.success({ title: 'Sesión iniciada con Google', text: 'Tu cuenta quedó lista para continuar.' });
        window.location.href = resolvePostAuthRoute(data?.user);
      }catch (error){
        await ui.error({ title: 'No se pudo autenticar con Google', text: error.message });
      }
    }


    async function parseApiError(response) {
      try {
        const data = await response.json();
        if (typeof data === 'string') return data;
        return data.message || data.error || `HTTP ${response.status}`;
      } catch {
        return `HTTP ${response.status}`;
      }
    }

    function showLogin() {
      loginForm.classList.remove('auth-form--hidden');
      signupForm.classList.add('auth-form--hidden');
      loginTab.classList.add('auth-tab--active');
      loginTab.setAttribute('aria-selected', 'true');
      signupTab.classList.remove('auth-tab--active');
      signupTab.setAttribute('aria-selected', 'false');
    }

    function showSignup() {
      signupForm.classList.remove('auth-form--hidden');
      loginForm.classList.add('auth-form--hidden');
      signupTab.classList.add('auth-tab--active');
      signupTab.setAttribute('aria-selected', 'true');
      loginTab.classList.remove('auth-tab--active');
      loginTab.setAttribute('aria-selected', 'false');
    }

    async function login() {
      const email = document.getElementById('loginEmail')?.value.trim();
      const password = document.getElementById('loginPassword')?.value;

      if (!email || !password) {
        await ui.alert({ title: 'Faltan datos', text: 'Completa email y contraseña.' });
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/users/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error(await parseApiError(res));
        const data = await res.json();
        saveAuth(data);
        await ui.success({ title: 'Sesión iniciada', text: 'Tu acceso fue correcto. Vamos a llevarte a tu panel.' });
        window.location.href = resolvePostAuthRoute(data?.user);
      } catch (error) {
        await ui.error({ title: 'No se pudo iniciar sesión', text: error.message });
      }
    }

    async function signup() {
      const name = document.getElementById('signupName')?.value.trim();
      const lastname = document.getElementById('signupLastname')?.value.trim();
      const email = document.getElementById('signupEmail')?.value.trim();
      const password = document.getElementById('signupPassword')?.value;

      if (!name || !lastname || !email || !password) {
        await ui.alert({ title: 'Faltan datos', text: 'Completa todos los campos.' });
        return;
      }

      if (password.length < 8) {
        await ui.alert({ title: 'Contraseña inválida', text: 'La contraseña debe tener al menos 8 caracteres.' });
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/users/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, lastname, email, password })
        });

        if (!res.ok) throw new Error(await parseApiError(res));

        await ui.success({ title: 'Registro exitoso', text: 'Ahora inicia sesión con tu cuenta.' });
        showLogin();
        document.getElementById('loginEmail').value = email;
        document.getElementById('loginPassword').value = password;
      } catch (error) {
        await ui.error({ title: 'No se pudo registrar', text: error.message });
      }
    }

    async function loginWithGoogle() {
      if (!googleClientId) {
        await loadAppConfig();
      }

      if (isGoogleInitialized && window.google) {
        window.google.accounts.id.prompt();
        return;
      }

      if (!googleClientId) {
        await ui.error({ title: 'Google no disponible', text: 'No se pudo cargar la configuración de Google. Verifica que el backend esté activo.' });
        return;
      }

      const googleToken = await ui.prompt({
        title: 'Google ID token',
        text: 'Pega aquí tu credential de Google para continuar.',
        input: 'textarea',
        placeholder: 'eyJhbGciOiJSUzI1NiIsImtpZCI6I...',
        confirmButtonText: 'Usar token',
        cancelButtonText: 'Cancelar',
        inputValidator: (value) => {
          if (!value || !value.trim()) return 'Pega un token antes de continuar.';
          return null;
        }
      });
      if (!googleToken) return;
      await authenticateWithGoogleToken(googleToken);
    }

    window.addEventListener('load', async () => {
      if (localStorage.getItem('token')) {
        window.location.href = resolvePostAuthRoute(getStoredUser());
        return;
      }

      await loadAppConfig();
      initGoogleIdentity();
    });
  </script>
  <script src="js/logout.js"></script>
</body>
</html>
