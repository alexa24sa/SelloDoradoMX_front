<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
</head>

<body class="h-screen bg-cover bg-center flex items-center justify-center"
      style="background-image: url('assets/images/bg.png');">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- Card -->
  <div class="relative bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl w-[90%] max-w-sm">

    <!-- Logo -->
    <div class="flex items-center gap-2 mb-4">
      <span>📍</span>
      <h2 class="font-semibold">SelloDoradoMX</h2>
    </div>

    <!-- Tabs -->
    <div class="flex bg-gray-200 rounded-full p-1 mb-4">
      <button id="loginTab" onclick="showLogin()" 
        class="flex-1 py-2 rounded-full bg-green-500 text-white">
        LOGIN
      </button>
      <button id="signupTab" onclick="showSignup()" 
        class="flex-1 py-2 rounded-full text-gray-500">
        SIGN UP
      </button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <p class="text-sm mb-3">Welcome to SelloDoradoMX!</p>

      <input class="w-full p-3 border rounded-lg mb-3" placeholder="Email">
      <input class="w-full p-3 border rounded-lg mb-3" placeholder="Password">

      <button onclick="login()" 
        class="w-full bg-green-500 text-white py-3 rounded-xl">
        LOGIN
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="hidden">
      <input class="w-full p-3 border rounded-lg mb-2" placeholder="Name">
      <input class="w-full p-3 border rounded-lg mb-2" placeholder="Lastname">
      <input class="w-full p-3 border rounded-lg mb-2" placeholder="Email">
      <input class="w-full p-3 border rounded-lg mb-3" placeholder="Password">

      <button class="w-full bg-green-500 text-white py-3 rounded-xl">
        Create Account
      </button>
    </div>

  </div>

  <script>
    function showLogin() {
      document.getElementById("loginForm").classList.remove("hidden");
      document.getElementById("signupForm").classList.add("hidden");

      document.getElementById("loginTab").classList.add("bg-green-500","text-white");
      document.getElementById("signupTab").classList.remove("bg-green-500","text-white");
    }

    function showSignup() {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("signupForm").classList.remove("hidden");

      document.getElementById("signupTab").classList.add("bg-green-500","text-white");
      document.getElementById("loginTab").classList.remove("bg-green-500","text-white");
    }

    function login() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
