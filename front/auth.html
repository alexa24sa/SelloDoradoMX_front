<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6BB88A" />
  <title>Acceso – SelloDoradoMX</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="auth-page">

  <div class="app-container">

    <!-- ===== FONDO + LOGO BLANCO ===== -->
    <div class="auth-hero">
      <img
        src="./assets/images/bg.png"
        alt="Fondo SelloDoradoMX"
        class="auth-hero-bg"
      />
      <div class="auth-hero-overlay" aria-hidden="true"></div>

      <!-- Logo blanco centrado sobre la imagen -->
      <div class="auth-hero-logo">
        <img
          src="./assets/images/logo-blanco.png"
          alt="SelloDoradoMX"
          class="auth-logo-img"
          onerror="this.replaceWith(document.createTextNode('SelloDoradoMX'))"
        />
      </div>
    </div>

    <!-- ===== CARD FORMULARIO ===== -->
    <div class="auth-card">

      <!-- Tabs LOGIN / SIGN UP -->
      <div class="auth-tabs" role="tablist">
        <button
          id="loginTab"
          class="auth-tab auth-tab--active"
          role="tab"
          aria-selected="true"
          onclick="showLogin()"
        >LOGIN</button>
        <button
          id="signupTab"
          class="auth-tab"
          role="tab"
          aria-selected="false"
          onclick="showSignup()"
        >SIGN UP</button>
      </div>

      <h2 class="auth-welcome">Welcome to SelloDoradoMX!</h2>

      <!-- ── LOGIN FORM ── -->
      <form id="loginForm" class="auth-form" novalidate>
        <input
          id="loginEmail"
          class="auth-input"
          type="email"
          placeholder="Email"
          autocomplete="email"
          aria-label="Email"
          required
        />
        <input
          id="loginPassword"
          class="auth-input"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          aria-label="Contraseña"
          required
        />

        <button type="button" class="btn-primary" onclick="login()">LOGIN</button>

        <!-- Divider -->
        <div class="auth-divider"><span>o</span></div>

        <!-- Google -->
        <button type="button" class="btn-google" onclick="loginWithGoogle()">
          <svg class="btn-google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Login with Google
        </button>
      </form>

      <!-- ── SIGNUP FORM ── -->
      <form id="signupForm" class="auth-form auth-form--hidden" novalidate>
        <input
          id="signupName"
          class="auth-input"
          type="text"
          placeholder="Name"
          autocomplete="given-name"
          aria-label="Nombre"
          required
        />
        <input
          id="signupLastname"
          class="auth-input"
          type="text"
          placeholder="Lastname"
          autocomplete="family-name"
          aria-label="Apellido"
          required
        />
        <input
          id="signupEmail"
          class="auth-input"
          type="email"
          placeholder="Email"
          autocomplete="email"
          aria-label="Email"
          required
        />
        <input
          id="signupPassword"
          class="auth-input"
          type="password"
          placeholder="Password"
          autocomplete="new-password"
          aria-label="Contraseña"
          minlength="8"
          required
        />

        <button type="button" class="btn-primary" onclick="signup()">Create Account</button>

        <!-- Divider -->
        <div class="auth-divider"><span>o</span></div>

        <!-- Google -->
        <button type="button" class="btn-google" onclick="loginWithGoogle()">
          <svg class="btn-google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>
      </form>

      <!-- "¿Eres turista?" enlace del mockup -->
      <p class="auth-tourist-link">
        Are you a tourist?
        <a href="index.html" class="auth-tourist-cta">Click here</a>
      </p>

    </div><!-- /.auth-card -->

  </div><!-- /.app-container -->

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const API_BASE_URL = 'http://localhost:8080/api/v1';
    const GOOGLE_CLIENT_ID = window.GOOGLE_CLIENT_ID || localStorage.getItem('googleClientId') || '';
    let isGoogleInitialized = false;

    const loginTab   = document.getElementById('loginTab');
    const signupTab  = document.getElementById('signupTab');
    const loginForm  = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    function initGoogleIdentity() {
      if (!window.google || !GOOGLE_CLIENT_ID) return;
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: (response) => {
          if (response?.credential) {
            authenticateWithGoogleToken(response.credential);
          }
        },
        auto_select: false,
        cancel_on_tap_outside: true
      });
      isGoogleInitialized = true;
    }

    function saveAuth(authResponse) {
      const token = authResponse?.accessToken;
      if (!token) return;
      localStorage.setItem('token', token);
      localStorage.setItem('tokenType', authResponse?.tokenType || 'Bearer');
      if (authResponse?.user) {
        localStorage.setItem('currentUser', JSON.stringify(authResponse.user));
      }
    }

    async function authenticateWithGoogleToken(googleToken) {
      try {
        const res = await fetch(`${API_BASE_URL}/users/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ googleToken })
        });

        if (!res.ok) throw new Error(await parseApiError(res));
        const data = await res.json();
        saveAuth(data);
        window.location.href = 'index.html';
      } catch (error) {
        alert(`No se pudo autenticar con Google: ${error.message}`);
      }
    }

    async function parseApiError(response) {
      try {
        const data = await response.json();
        if (typeof data === 'string') return data;
        return data.message || data.error || `HTTP ${response.status}`;
      } catch {
        return `HTTP ${response.status}`;
      }
    }

    function showLogin() {
      loginForm.classList.remove('auth-form--hidden');
      signupForm.classList.add('auth-form--hidden');
      loginTab.classList.add('auth-tab--active');
      loginTab.setAttribute('aria-selected', 'true');
      signupTab.classList.remove('auth-tab--active');
      signupTab.setAttribute('aria-selected', 'false');
    }

    function showSignup() {
      signupForm.classList.remove('auth-form--hidden');
      loginForm.classList.add('auth-form--hidden');
      signupTab.classList.add('auth-tab--active');
      signupTab.setAttribute('aria-selected', 'true');
      loginTab.classList.remove('auth-tab--active');
      loginTab.setAttribute('aria-selected', 'false');
    }

    async function login() {
      const email = document.getElementById('loginEmail')?.value.trim();
      const password = document.getElementById('loginPassword')?.value;

      if (!email || !password) {
        alert('Completa email y contraseña.');
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/users/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error(await parseApiError(res));
        const data = await res.json();
        saveAuth(data);
        window.location.href = 'index.html';
      } catch (error) {
        alert(`No se pudo iniciar sesión: ${error.message}`);
      }
    }

    async function signup() {
      const name = document.getElementById('signupName')?.value.trim();
      const lastname = document.getElementById('signupLastname')?.value.trim();
      const email = document.getElementById('signupEmail')?.value.trim();
      const password = document.getElementById('signupPassword')?.value;

      if (!name || !lastname || !email || !password) {
        alert('Completa todos los campos.');
        return;
      }

      if (password.length < 8) {
        alert('La contraseña debe tener al menos 8 caracteres.');
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/users/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, lastname, email, password })
        });

        if (!res.ok) throw new Error(await parseApiError(res));

        alert('Registro exitoso. Ahora inicia sesión.');
        showLogin();
        document.getElementById('loginEmail').value = email;
        document.getElementById('loginPassword').value = password;
      } catch (error) {
        alert(`No se pudo registrar: ${error.message}`);
      }
    }

    async function loginWithGoogle() {
      if (isGoogleInitialized && window.google) {
        window.google.accounts.id.prompt();
        return;
      }

      const googleToken = prompt('Pega aquí tu Google ID token (credential):');
      if (!googleToken) return;
      await authenticateWithGoogleToken(googleToken);
    }

    window.addEventListener('load', initGoogleIdentity);
  </script>

</body>
</html>
