<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6BB88A" />
  <title>Favoritos - SelloDoradoMX</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div class="app-container">
    <header class="header">
      <div class="header-content">
        <div class="logo-section">
          <img
            src="./assets/insignia.png"
            alt="Sello Dorado insignia"
            class="logo-icon"
            onerror="this.style.display='none'"
          />
          <span class="logo-text">
            <span class="logo-brand">SelloDorado</span><span class="logo-mx">MX</span>
          </span>
        </div>
      </div>
    </header>

    <main class="favorites-content">
      <h1 class="favorites-title">Mis Favoritos</h1>
      <p class="favorites-subtitle">Negocios que has guardado</p>

      <section id="favorites-section" class="favorites-section">
        <div id="favorites-grid" class="cards-grid" aria-busy="true" aria-label="Negocios favoritos"></div>
      </section>

      <section id="empty-favorites" class="empty-favorites" hidden>

        <h2>Aún no tienes favoritos</h2>
        <p>Explora la app y guarda tus negocios favoritos tocando el corazón en las tarjetas</p>
        <button id="explore-btn" class="btn-primary" type="button">Explorar negocios</button>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegacion principal">
      <button class="nav-item" aria-label="Inicio" onclick="window.location.href='home.html'">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </button>

      <button class="nav-item nav-item--active" aria-label="Favoritos">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>

      <button class="nav-item" aria-label="Perfil" onclick="window.location.href='profile.html'">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </button>

      <button class="nav-item" aria-label="Cerrar sesión" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 17l5-5-5-5v3H9v4h7v3zM3 5h8V3H3c-1.1 0-2 .9-2 2v14c0
          1.1.9 2 2 2h8v-2H3V5z"/>
        </svg>
      </button>
    </nav>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "auth.html";
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/favorites.js"></script>
  <script src="js/logout.js"></script>
</body>
</html>
