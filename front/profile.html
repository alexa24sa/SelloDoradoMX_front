<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6BB88A" />
  <title>Perfil - SelloDoradoMX</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-container profile-page">
    <header class="profile-header">
      <div class="logo-section">
        <img src="./assets/insignia.png" alt="Sello Dorado insignia" class="logo-icon" onerror="this.style.display='none'" />
        <span class="logo-text">
          <span class="logo-brand">SelloDorado</span><span class="logo-mx">MX</span>
        </span>
      </div>
      <button id="logout-btn" class="profile-logout-btn" type="button">Cerrar sesión</button>
    </header>

    <main class="profile-content">
      <h1 class="profile-title">My profile</h1>

      <section class="profile-user-card" aria-label="Información del usuario">
        <div id="profile-avatar" class="profile-avatar">U</div>
        <div class="profile-user-meta">
          <h2 id="profile-name" class="profile-user-name">Cargando...</h2>
          <p id="profile-role" class="profile-user-role">Tourist</p>
        </div>
      </section>

      <section id="merchant-status-section" class="profile-panel" hidden>
        <h3 class="profile-section-title">Estado de Merchant</h3>
        <p id="merchant-status-message" class="profile-helper-text"></p>
        <img id="merchant-saved-image" alt="Identificación guardada" hidden style="max-width: 100%; border-radius: 8px; border: 1px solid #d6ebde; margin-top: 10px;" />
      </section>

      <section id="merchant-cta-section" class="profile-panel" hidden>
        <h3 class="profile-section-title">Tienes negocio?</h3>
        <p class="profile-helper-text">Completa tu Merchant Profile para iniciar el proceso de validación.</p>
        <button id="open-merchant-form-btn" class="btn-primary profile-main-btn" type="button">Quiero ser Merchant</button>
      </section>

      <section id="merchant-form-section" class="profile-panel" hidden>
        <h3 class="profile-section-title">Merchant Profile</h3>
        <form id="merchant-profile-form" class="auth-form" novalidate>
          <input id="merchant-curp" class="auth-input" type="text" placeholder="CURP" required />
          <input id="merchant-phone" class="auth-input" type="text" placeholder="Teléfono (10 dígitos)" required />
          <input id="merchant-store-name" class="auth-input" type="text" placeholder="Nombre del negocio" required />
          <input id="merchant-id-image" class="auth-input" type="file" accept="image/*" required />
          <p class="profile-helper-text">Sube una foto de tu identificación oficial (se enviará como texto Base64).</p>
          <img id="merchant-id-preview" alt="Vista previa de identificación" hidden style="max-width: 100%; border-radius: 8px; border: 1px solid #d6ebde;" />
          <button type="submit" class="btn-primary profile-main-btn">Enviar solicitud</button>
        </form>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button class="nav-item" aria-label="Inicio" onclick="window.location.href='index.html'">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </button>
      <button class="nav-item" aria-label="Favoritos">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>
      <button class="nav-item nav-item--active" aria-label="Perfil">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </button>
    </nav>
  </div>

  <script src="js/profile.js"></script>
</body>
</html>
