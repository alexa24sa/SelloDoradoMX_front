<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6BB88A">
  <title>SelloDoradoMX</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Iconos de IonIcons (para los SVG de la nav) -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <noscript><script src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.js"></script></noscript>
</head>

<body>
  <!-- Contenedor Principal -->
  <div class="app-container">

    <!-- HEADER -->
    <header class="header">
      <div class="header-content">
        <div class="logo-section">
          <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="#6BB88A" stroke-width="2"/>
            <path d="M20 8L28 32H12L20 8Z" fill="#6BB88A"/>
          </svg>
          <h1 class="logo-text">
            SelloDorado<span class="logo-mx">MX</span>
          </h1>
        </div>
      </div>
    </header>

    <!-- MAPA Y SEARCH BAR -->
    <section class="hero-section">
      <div class="map-container">
        <!-- Placeholder div en lugar del mapa por ahora -->
        <img src="https://placehold.co/480x480/E8E8E8/999999?text=Mapa" alt="Mapa" class="map-image">
      </div>
    </section>

    <!-- EFECTO BOTTOM SHEET -->
    <div class="bottom-sheet">
      <!-- Handle para deslizar -->
      <div class="drag-handle"></div>

      <!-- Search Bar Flotante -->
      <div class="search-bar-wrapper">
        <div class="search-bar">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input 
            type="text" 
            class="search-input" 
            placeholder="Search"
            aria-label="Buscar lugares"
          >
        </div>
      </div>

      <!-- CATEGORÍAS -->
      <section class="categories-section">
        <div class="categories-scroll">
          <button class="category-btn category-btn--active" data-category="top">
            Top
          </button>
          <button class="category-btn" data-category="gastronomy">
            Gastronomy
          </button>
          <button class="category-btn" data-category="culture">
            Culture
          </button>
          <button class="category-btn" data-category="adventure">
            Adventure
          </button>
        </div>
      </section>

      <!-- TARJETAS EN GRID -->
      <section class="content-section">
        
        <!-- SelloDorado -->
        <div class="section-label">
          <h2>SelloDorado</h2>
        </div>

        <div class="cards-grid" id="businesses-grid">
          <!-- Las tarjetas se renderizarán aquí vía JS -->
        </div>

        <!-- Más Categorías de Tarjetas -->
        <div class="section-label">
          <h2>Culture</h2>
        </div>

        <div class="cards-grid" id="culture-grid">
          <!-- Las tarjetas se renderizarán aquí vía JS -->
        </div>

      </section>
    </div>

    <!-- Espaciado inferior para la nav -->
    <div style="height: 80px;"></div>

    <!-- NAVEGACIÓN INFERIOR FIJA -->
    <nav class="bottom-nav">
      <button class="nav-item nav-item--active" aria-label="Inicio" title="Inicio">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </button>

      <button class="nav-item" aria-label="Favoritos" title="Favoritos">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>

      <button class="nav-item" aria-label="Búsqueda" title="Búsqueda">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </button>

      <button class="nav-item" aria-label="Perfil" title="Perfil">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </button>
    </nav>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
